# Personal portfolio — joins your VPS host reverse-proxy network (no host 80/443 here).
# Copy .env.example → .env, then: docker compose up -d --build
#
# DNS dev.muteeblabs.uk must point at your host nginx (see edge-nginx-dev.muteeblabs.uk.conf).

name: muteeb-portfolio

services:
  web:
    build:
      context: .
      target: web
      args:
        VITE_SITE_URL: ${PUBLIC_SITE_URL:-https://dev.muteeblabs.uk}
        VITE_CONTACT_API_URL: ${VITE_CONTACT_API_URL:-/api/contact}
    image: muteeb-portfolio/web:latest
    container_name: muteeb-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - edge_proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  api:
    build:
      context: .
      target: api
    image: muteeb-portfolio/api:latest
    container_name: muteeb-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://dev.muteeblabs.uk}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dev.muteeblabs.uk,http://localhost:5173}
      MAIL_BRAND_NAME: ${MAIL_BRAND_NAME:-Muteeb Labs}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
      SEND_CLIENT_ACK: ${SEND_CLIENT_ACK:-True}
      MAIL_SIGN_NAME: ${MAIL_SIGN_NAME:-Muteeb Ur Rehman}
      MAIL_SIGN_TITLE: ${MAIL_SIGN_TITLE:-Full Stack Developer & AI Engineer}
      MAIL_REPLY_WINDOW: ${MAIL_REPLY_WINDOW:-usually within one day}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BOOKING_DB_PATH: /data/bookings.sqlite
      BOOKING_TIMEZONE: ${BOOKING_TIMEZONE:-Asia/Karachi}
      MEETING_LINK: ${MEETING_LINK:-}
      HUBSPOT_ENABLED: ${HUBSPOT_ENABLED:-false}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      HUBSPOT_PIPELINE_ID: ${HUBSPOT_PIPELINE_ID:-default}
      HUBSPOT_DEAL_STAGE: ${HUBSPOT_DEAL_STAGE:-appointmentscheduled}
      N8N_BOOKING_WEBHOOK_URL: ${N8N_BOOKING_WEBHOOK_URL:-}
      BOOKING_ADMIN_KEY: ${BOOKING_ADMIN_KEY:-}
    volumes:
      - booking_data:/data
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 12s

volumes:
  booking_data:

networks:
  internal:
    driver: bridge
  edge_proxy:
    external: true
    # Docker network your host nginx container uses (docker network ls)
    name: ${EDGE_PROXY_NETWORK:-qubix-solutions_qubix-net}
