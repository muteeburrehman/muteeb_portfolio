# Host reverse proxy — personal portfolio only (dev.muteeblabs.uk → muteeb-web).
# Install on the VPS nginx that already listens on 80/443, then reload that container.
#
#   cp edge-nginx-dev.muteeblabs.uk.conf /path/to/host/nginx/conf.d/dev.muteeblabs.uk.conf
#   docker exec <host-nginx-container> nginx -t && docker exec <host-nginx-container> nginx -s reload
#
# If this domain shows another app, something else owns server_name dev.muteeblabs.uk:
#   docker exec <host-nginx-container> grep -r "dev.muteeblabs.uk" /etc/nginx/

server {
    listen 80;
    server_name dev.muteeblabs.uk;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name dev.muteeblabs.uk;

    ssl_certificate     /etc/letsencrypt/live/dev.muteeblabs.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.muteeblabs.uk/privkey.pem;

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $muteeb_web muteeb-web:80;
        proxy_pass http://$muteeb_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
