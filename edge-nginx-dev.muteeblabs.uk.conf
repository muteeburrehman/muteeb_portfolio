# Step 1 — HTTP only (no SSL files required). Install, reload, test:
#   cp edge-nginx-dev.muteeblabs.uk.conf $CONF_DIR/dev.muteeblabs.uk.conf
#   docker exec qubix-nginx nginx -t && docker exec qubix-nginx nginx -s reload
#   curl -sS http://dev.muteeblabs.uk/healthz
#
# Step 2 — certificate (from your host nginx / certbot compose directory):
#   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
#     -d dev.muteeblabs.uk --agree-tos --email YOUR@EMAIL
#
# Step 3 — enable HTTPS:
#   cp edge-nginx-dev.muteeblabs.uk.ssl.conf $CONF_DIR/dev.muteeblabs.uk.ssl.conf
#   docker exec qubix-nginx nginx -t && docker exec qubix-nginx nginx -s reload

server {
    listen 80;
    server_name dev.muteeblabs.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $muteeb_web muteeb-web:80;
        proxy_pass http://$muteeb_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
