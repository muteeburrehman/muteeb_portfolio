# After certbot — replace dev.muteeblabs.uk.conf with this file:
#   cp edge-nginx-dev.muteeblabs.uk.ssl.conf $CONF_DIR/dev.muteeblabs.uk.conf
#   docker exec qubix-nginx nginx -t && docker exec qubix-nginx nginx -s reload

server {
    listen 443 ssl;
    http2 on;
    server_name dev.muteeblabs.uk;

    ssl_certificate     /etc/letsencrypt/live/dev.muteeblabs.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.muteeblabs.uk/privkey.pem;

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $muteeb_web muteeb-web:80;
        proxy_pass http://$muteeb_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name dev.muteeblabs.uk;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
